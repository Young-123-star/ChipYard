<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ab8f0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7ab8f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b9a8f5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#b9a8f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fd8e8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8fd8e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffd9b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfe"/>
      <stop offset="100%" stop-color="#eef1f7"/>
    </linearGradient>
  </defs>

  <!-- 底色 -->
  <rect width="1920" height="1080" fill="url(#base)"/>

  <!-- 柔和光斑 -->
  <ellipse cx="380" cy="220" rx="640" ry="480" fill="url(#g1)"/>
  <ellipse cx="1560" cy="900" rx="720" ry="520" fill="url(#g2)"/>
  <ellipse cx="1450" cy="160" rx="520" ry="380" fill="url(#g3)"/>
  <ellipse cx="240" cy="950" rx="480" ry="360" fill="url(#g4)"/>

  <!-- 芯片电路意象：走线 + 焊点（左下） -->
  <g stroke="#1d4f8a" stroke-width="2" fill="none" opacity="0.07">
    <path d="M -40 760 H 220 V 640 H 420 V 820 H 640 V 700 H 860"/>
    <path d="M -40 860 H 160 V 920 H 380 V 760 H 560 V 980 H 780"/>
    <path d="M -40 960 H 300 V 880 H 500 V 1040 H 720"/>
    <path d="M 120 1080 V 1000 H 340 V 1080"/>
    <path d="M 940 1080 V 940 H 1120 V 1020 H 1320"/>
  </g>
  <g fill="#1d4f8a" opacity="0.10">
    <circle cx="220" cy="640" r="5"/><circle cx="420" cy="820" r="5"/><circle cx="640" cy="700" r="5"/>
    <circle cx="380" cy="760" r="5"/><circle cx="560" cy="980" r="5"/><circle cx="500" cy="880" r="5"/>
    <circle cx="860" cy="700" r="5"/><circle cx="1120" cy="940" r="5"/>
    <rect x="290" y="870" width="11" height="11" rx="2"/>
    <rect x="775" y="975" width="11" height="11" rx="2"/>
    <rect x="1315" y="1015" width="11" height="11" rx="2"/>
  </g>

  <!-- 芯片电路意象：走线（右上，镜像呼应） -->
  <g stroke="#1d4f8a" stroke-width="2" fill="none" opacity="0.06">
    <path d="M 1960 180 H 1700 V 300 H 1500 V 120 H 1280 V 260 H 1080"/>
    <path d="M 1960 80 H 1760 V 40 H 1560 V 200 H 1380"/>
    <path d="M 1820 0 V 100 H 1640 V 0"/>
  </g>
  <g fill="#1d4f8a" opacity="0.09">
    <circle cx="1700" cy="300" r="5"/><circle cx="1500" cy="120" r="5"/><circle cx="1280" cy="260" r="5"/>
    <circle cx="1560" cy="200" r="5"/><circle cx="1080" cy="260" r="5"/>
    <rect x="1374" y="194" width="11" height="11" rx="2"/>
  </g>

  <!-- 细网格（极淡，给页面"图纸"质感） -->
  <g stroke="#1d4f8a" stroke-width="1" opacity="0.025">
    <path d="M 0 270 H 1920 M 0 540 H 1920 M 0 810 H 1920"/>
    <path d="M 480 0 V 1080 M 960 0 V 1080 M 1440 0 V 1080"/>
  </g>
</svg>
