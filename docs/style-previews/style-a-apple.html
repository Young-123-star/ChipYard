<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>风格A · Apple 风</title>
<style>
  :root {
    --bg: #f5f5f7; --surface: rgba(255,255,255,.72); --ink: #1d1d1f; --ink-2: #6e6e73;
    --accent: #0071e3; --ok: #34c759; --warn: #ff9f0a; --bad: #ff453a; --hold: #5e9eff;
    --radius: 18px;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "SF Pro SC", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    background: linear-gradient(180deg,#fbfbfd 0%, #f0f0f4 100%); color: var(--ink);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  aside {
    background: var(--surface); backdrop-filter: blur(30px) saturate(1.6);
    border-right: 1px solid rgba(0,0,0,.06); padding: 28px 14px;
  }
  .logo { font-size: 17px; font-weight: 600; letter-spacing: -.02em; padding: 0 12px 22px; }
  .nav a {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px;
    color: var(--ink-2); text-decoration: none; font-size: 14px; margin-bottom: 2px;
  }
  .nav a.on { background: rgba(0,113,227,.1); color: var(--accent); font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .5; }
  main { padding: 40px 48px; }
  h1 { font-size: 34px; font-weight: 700; letter-spacing: -.025em; }
  .sub { color: var(--ink-2); font-size: 15px; margin: 6px 0 30px; }
  .stats { display: flex; gap: 14px; margin-bottom: 28px; }
  .stat {
    flex: 1; background: var(--surface); backdrop-filter: blur(30px);
    border: 1px solid rgba(0,0,0,.05); border-radius: var(--radius); padding: 20px 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .stat b { font-size: 28px; font-weight: 700; letter-spacing: -.02em; display: block; }
  .stat span { font-size: 13px; color: var(--ink-2); }
  .board { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .room {
    background: var(--surface); backdrop-filter: blur(30px);
    border: 1px solid rgba(0,0,0,.05); border-radius: var(--radius); padding: 18px 20px;
    box-shadow: 0 1px 2px rgba(0,0,0,.03); transition: transform .2s;
  }
  .room:hover { transform: translateY(-2px); }
  .room .no { font-size: 19px; font-weight: 600; letter-spacing: -.01em; }
  .room .meta { font-size: 13px; color: var(--ink-2); margin: 4px 0 14px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 99px;
  }
  .pill i { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .p-ok   { background: rgba(52,199,89,.12);  color: #1d8a3e; } .p-ok i { background:#34c759; }
  .p-warn { background: rgba(255,159,10,.14); color: #b06b00; } .p-warn i { background:#ff9f0a; }
  .p-bad  { background: rgba(255,69,58,.12);  color: #c22a20; } .p-bad i { background:#ff453a; }
  .login {
    position: fixed; right: 48px; bottom: 44px; width: 270px; background: var(--surface);
    backdrop-filter: blur(30px); border: 1px solid rgba(0,0,0,.06); border-radius: 22px;
    padding: 24px; box-shadow: 0 18px 50px rgba(0,0,0,.12);
  }
  .login h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .login input {
    width: 100%; border: 1px solid rgba(0,0,0,.12); border-radius: 11px; padding: 10px 12px;
    font-size: 14px; margin-bottom: 9px; background: rgba(255,255,255,.8); outline: none;
  }
  .login button {
    width: 100%; background: var(--accent); color: #fff; border: 0; border-radius: 11px;
    padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
<div class="shell">
  <aside>
    <div class="logo">宿舍管理</div>
    <nav class="nav">
      <a class="on"><i class="dot"></i>房间状态看板</a>
      <a><i class="dot"></i>楼栋管理</a>
      <a><i class="dot"></i>楼层管理</a>
      <a><i class="dot"></i>房间管理</a>
      <a><i class="dot"></i>床位管理</a>
    </nav>
  </aside>
  <main>
    <h1>A栋员工宿舍</h1>
    <p class="sub">园区东路1号 · 6 层 · 4 间在册 · 8 个床位</p>
    <div class="stats">
      <div class="stat"><b>87.5%</b><span>床位空闲率</span></div>
      <div class="stat"><b>1</b><span>已入住</span></div>
      <div class="stat"><b>1</b><span>维修中房间</span></div>
      <div class="stat"><b>0</b><span>待处理申请</span></div>
    </div>
    <div class="board">
      <div class="room"><div class="no">A101</div><div class="meta">双人间 · 0/2 床</div><span class="pill p-ok"><i></i>空闲</span></div>
      <div class="room"><div class="no">A102</div><div class="meta">双人间 · 1/2 床</div><span class="pill p-warn"><i></i>已满</span></div>
      <div class="room"><div class="no">A201</div><div class="meta">四人间 · 0/4 床</div><span class="pill p-bad"><i></i>维修中</span></div>
      <div class="room"><div class="no">A202</div><div class="meta">双人间 · 0/2 床</div><span class="pill p-ok"><i></i>空闲</span></div>
    </div>
    <div class="login">
      <h3>登录宿舍管理系统</h3>
      <input placeholder="用户名" value="admin">
      <input placeholder="密码" type="password" value="123456">
      <button>登录</button>
    </div>
  </main>
</div>
</body>
</html>
