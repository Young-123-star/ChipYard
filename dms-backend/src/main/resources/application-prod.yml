spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:dms}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:dms}
    password: ${MYSQL_PASSWORD:dms_password}
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
  h2:
    console:
      enabled: false

dms:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-before-deploying-chipyard}

integration:
  token: ${INTEGRATION_TOKEN:change-this-token-before-deploying-chipyard}
