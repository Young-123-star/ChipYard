server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:dms;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-not-delete-value: "null"
      logic-delete-value: "now()"

dms:
  jwt:
    secret: "dms-demo-secret-key-please-change-in-prod-0123456789abcdef"
    expire-minutes: 720

integration:
  token: dms-demo-integration-token

springdoc:
  swagger-ui:
    path: /swagger-ui.html
knife4j:
  enable: true
